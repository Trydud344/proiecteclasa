<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>160 Ani de Știință | Clasa 11 D - CNU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            --amoled-black: #000000;
            --surface-grey: #121212;
            --border-grey: #2a2a2a;
            --x: 50vw;
            --y: 50vh;
        }

        body {
            background-color: var(--amoled-black);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .top-fade {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 120px;
            background: linear-gradient(to bottom, var(--amoled-black) 20%, transparent 100%);
            z-index: 30;
            pointer-events: none;
        }

        .glass-card {
            background: var(--surface-grey);
            border: 1px solid var(--border-grey);
            box-sizing: border-box;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .project-card {
            height: 300px;
            cursor: pointer;
            position: relative;
            --active: 0;
        }

        .project-card:not(.active):hover { --active: 1; }

        .project-card::before {
            content: "";
            position: absolute; inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: radial-gradient(
                circle at calc(var(--x) * 1px) calc(var(--y) * 1px),
                rgba(255,255,255,0.4), transparent 250px
            );
            background-attachment: fixed;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
            opacity: var(--active, 0);
            transition: opacity 0.2s ease;
            z-index: 20;
        }

        .project-card::after {
            content: "";
            position: absolute; inset: 0;
            border-radius: inherit;
            background: radial-gradient(
                circle at calc(var(--x) * 1px) calc(var(--y) * 1px),
                rgba(255,255,255,0.05), transparent 250px
            );
            background-attachment: fixed;
            opacity: var(--active, 0);
            transition: opacity 0.2s ease;
            pointer-events: none;
            z-index: 10;
        }

        .project-card.active::before,
        .project-card.active::after { display: none !important; }

        @media (max-width: 768px) {
            .project-card::before,
            .project-card::after { display: none !important; }
        }

        .project-card.active { cursor: default; }

        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 40;
        }
        .overlay.active { opacity: 1; pointer-events: auto; }

        .placeholder-ui { transition: opacity 0.3s ease; width: 100%; }

        .project-card.active .placeholder-ui {
            opacity: 0;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .content-hidden { display: none !important; opacity: 0; transition: opacity 0.5s ease 0.3s; }
        .project-card.active .content-hidden { display: flex !important; opacity: 1; }

        .close-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 8px; border-radius: 50%;
            background: rgba(255,255,255,0.1);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease 0.3s;
            z-index: 60;
            display: flex; align-items: center; justify-content: center;
        }
        .project-card.active .close-btn { opacity: 1; pointer-events: auto; }

        .ppt-frame {
            background: #050505;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .project-card.active .content-hidden {
                overflow-y: auto !important;
                overflow-x: hidden !important;
                -webkit-overflow-scrolling: touch;
            }
            .project-card.active .ppt-aspect-mobile {
                flex: none !important; width: 100% !important;
                aspect-ratio: 16 / 9; min-height: 0 !important;
            }
            .project-card.active .ppt-aspect-mobile-4-3 {
                flex: none !important; width: 100% !important;
                aspect-ratio: 3 / 2; min-height: 0 !important;
            }
            .project-card.active .iframe-outer-mobile {
                flex: none !important; width: 100% !important; height: auto !important;
            }
        }

        ::-webkit-scrollbar       { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--amoled-black); }
        ::-webkit-scrollbar-thumb { background: var(--border-grey); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-12 pb-0 md:pb-0">

    <div class="top-fade"></div>
    <div id="overlay" class="overlay" onclick="closeAllCards()"></div>

    <header class="max-w-6xl mx-auto text-center mb-16 md:mb-20 mt-6 md:mt-10">
        <div class="inline-block px-4 py-1.5 mb-6 rounded-full border border-zinc-800 bg-zinc-900/50 text-[10px] font-bold tracking-[0.2em] uppercase text-zinc-400">
            Colegiul Național „Unirea" • Clasa 11 D
        </div>
        <h1 class="text-4xl md:text-7xl font-light tracking-tighter mb-4">
            160 Ani de <span class="font-semibold">Știință</span>
        </h1>
        <p class="text-zinc-500 text-base md:text-lg font-light italic">
            Arhiva digitală de proiecte și cercetări științifice
        </p>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8" id="scientistsGrid"></div>
    </main>

    <section class="max-w-6xl mx-auto text-center mt-32 mb-10 md:mb-16">
        <h2 class="text-3xl md:text-6xl font-light tracking-tighter mb-4">
            <span class="font-semibold">Fizica</span> din spatele obiectelor obișnuite
        </h2>
        <p class="text-zinc-500 text-base md:text-lg font-light italic mb-12">
            Aplicații practice ale undelor electromagnetice
        </p>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8" id="physicsGrid"></div>
    </section>

    <footer class="w-full border-t border-zinc-900 mt-24 md:mt-32">
        <div class="relative max-w-6xl mx-auto py-8 md:py-10 px-4 flex items-center justify-center">
            <p class="text-center text-zinc-600 text-xs tracking-widest uppercase font-medium z-10">
                2026 • Colegiul Național UNIREA • Clasa 11 D
            </p>
            <div class="absolute right-2 md:right-8 top-1/2 -translate-y-1/2 mt-2 md:mt-3 w-20 h-20 md:w-24 md:h-24 text-zinc-500 hover:text-white transition-colors duration-300 pointer-events-none md:pointer-events-auto cursor-default">
                <div id="circular-text" class="relative w-full h-full animate-[spin_12s_linear_infinite] text-[8px] md:text-[9.5px] font-bold"></div>
            </div>
        </div>
    </footer>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  DATA  — to add/edit a card, only touch this section
// ─────────────────────────────────────────────────────────────────────────────

const SCIENTISTS = [
    {

        title: 'Oamenii de știință care au schimbat lumea',

        description: 'Acest proiect explorează figurile emblematice ale fizicii și modul în care descoperirile lor au redefinit înțelegerea noastră asupra timpului și spațiului.',
        quote: '"Imagination is more important than knowledge."',

        iframe: 'https://1drv.ms/p/c/ef78d9a2948c4fe3/IQTuoLGfRV6aT4uy2AXFL3f0ARq_OC9qV-5__inR-fqBuJU?wdAr=1.7777777777777777',
        aspect: 'ppt-aspect-mobile',
    },
    {
        icon: `<path d="M6 18h8"/><path d="M3 22h18"/><path d="M14 22a7 7 0 1 0 0-14h-1"/><path d="M9 14h2"/><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z"/><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/>`,
        title: 'Femeile de știință care au schimbat lumea',
        subtitle: 'Echipa Fetelor',
        description: 'Acest proiect celebrează contribuțiile esențiale ale femeilor pionier în știință, de la descoperirea radioactivității la fundamentarea structurii ADN-ului.',
        quote: '"Nimic în viață nu este de temut, trebuie doar înțeles."',
        quoteAuthor: 'Marie Curie',
        iframe: 'https://1drv.ms/p/c/ef78d9a2948c4fe3/IQRAyQCMnA6zRICvXBnJYBplAa7AO9WVV-7C6wKU1KlMdyw?wdAr=1.7777777777777777',

const PHYSICS = [
    {
        icon: `<circle cx="12" cy="12" r="2"/><path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"/>`,
        title: '1) Radio',
        subtitle: 'Unde & Aparat',
        comingSoon: true,
    },
    {
        icon: `<rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/>`,
        title: '2) TV',
        subtitle: 'Unde & Aparat',
        description: 'Transmisia semnalului TV, unde electromagnetice și procesul de funcționare.',
        quote: '"Televiziunea va aduce întreaga lume în casele oamenilor obișnuiți."',
        quoteAuthor: 'David Sarnoff',
        iframe: 'https://1drv.ms/p/c/ef78d9a2948c4fe3/IQQgD8O2-QxFS6xyf4SSBN6JARdjOOqvhJnix2FApO4W280?wdAr=1.7777777777777777',
        aspect: 'ppt-aspect-mobile',
    },
    {
        icon: `<circle cx="12" cy="12" r="10"/><path d="M12 2v20"/><path d="M2 12h20"/>`,
        title: '3) Detectoare de metale',
        subtitle: 'Infraroșu & Reguli',
        description: 'Principiul de funcționare bazat pe inducție electromagnetică, reguli de utilizare și aplicații practice ale detectoarelor de metale.',
        quote: '"Nimic nu este prea minunat pentru a fi adevărat, dacă este în concordanță cu legile naturii."',
        quoteAuthor: 'Michael Faraday',
        iframe: 'https://1drv.ms/p/c/ef78d9a2948c4fe3/IQR_xTPL5R9DQ5WZzZAMwNr3ATBBhnBsZgzITFiuyZd6sQY?wdAr=1.5',
        aspect: 'ppt-aspect-mobile-4-3',
    },
    {
        icon: `<rect x="2" y="6" width="20" height="12" rx="2"/><path d="M18 10v4"/><path d="M2 10h12"/><path d="M2 14h12"/>`,
        title: '4) Cuptorul cu microunde',
        subtitle: 'Microunde & Aplicații',
        description: 'Principiul fizic al microundelor, funcționarea cuptorului și alte aplicații ale acestor unde electromagnetice.',
        quote: '"Invenția este doar un accident care a întâlnit o minte pregătită."',
        quoteAuthor: 'Albert Szent-Györgyi',
        iframe: 'https://1drv.ms/p/c/ef78d9a2948c4fe3/IQR-nQz6qI06RYDtUlXJkzHzASzUjBIsPVqOCRvMV5eOfEM?wdAr=1.7777777777777777',
        aspect: 'ppt-aspect-mobile',
    },
    {
        icon: `<rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/>`,
        title: '5) Telefonul',
        subtitle: 'Comunicații mobile',
        description: 'Fizica din spatele comunicațiilor mobile, rețelele celulare și modul în care vocea și datele sunt transmise prin unde electromagnetice.',
        quote: '"Nu mă îndoiesc că în viitor firele telefonice vor uni fiecare casă și birou."',
        quoteAuthor: 'Alexander Graham Bell (1878)',
        iframe: 'https://1drv.ms/p/c/ef78d9a2948c4fe3/IQSAV8VjmSXCRoXw9-xQJNtxAe2qnvqDbw7qXlE_bpknGuc?wdAr=1.7777777777777777',
        aspect: 'ppt-aspect-mobile',
    },
    {
        icon: `<path d="M4 10a10 10 0 0 1 16 0"/><path d="M12 10v10"/><path d="M8 20h8"/><circle cx="12" cy="10" r="2"/>`,
        title: '6) Radio locație',
        subtitle: '& Radio astronomie',
        comingSoon: true,
    },
    {
        icon: `<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>`,
        title: '7) Măsuri de protecție',
        subtitle: 'A persoanelor și a mediului',
        comingSoon: true,
    },
];

// ─────────────────────────────────────────────────────────────────────────────
//  CARD BUILDER
// ─────────────────────────────────────────────────────────────────────────────

const CLOSE_BTN = `
    <button class="close-btn" onclick="event.stopPropagation(); closeAllCards()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
    </button>`;

const SWIPE_HINT = `
    <div class="flex md:hidden items-center justify-center gap-2 mt-3 text-zinc-500 text-[10px] uppercase tracking-widest font-semibold animate-pulse flex-shrink-0">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 8l4 4-4 4"/><path d="M7 8l-4 4 4 4"/><line x1="3" y1="12" x2="21" y2="12"/>
        </svg>
        <span>Glisează orizontal pentru slide-uri</span>
    </div>`;

function buildCard(data) {
    const placeholder = `
        <div class="placeholder-ui text-center">
            <div class="w-16 h-16 bg-white/5 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform flex-shrink-0">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${data.icon}</svg>
            </div>
            <h3 class="text-lg md:text-xl font-medium mt-2 md:mt-0">${data.title}</h3>
            <p class="text-zinc-500 text-sm md:text-base mt-2">${data.subtitle}</p>
        </div>`;

    const expanded = data.comingSoon
        ? `<div class="content-hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[100vw] h-[100dvh] md:w-[90vw] md:h-[85vh] flex-col items-center justify-center p-8 md:p-16 overflow-hidden text-center">
               <h2 class="text-5xl md:text-7xl font-light text-white tracking-tighter mb-4">Coming <span class="font-semibold">soon</span>...</h2>
               <p class="text-zinc-500 text-lg md:text-xl max-w-2xl leading-relaxed">Informațiile pentru acest capitol sunt în lucru.</p>
           </div>`
        : `<div class="content-hidden absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[100vw] h-[100dvh] md:w-[90vw] md:h-[85vh] flex-col md:flex-row gap-4 md:gap-8 overflow-hidden p-6 pt-16 md:p-10 text-left">
               <div class="md:w-1/3 flex flex-col justify-start md:justify-center w-full flex-shrink-0 md:flex-shrink items-start">
                   <div class="w-8 h-8 bg-white/10 rounded-lg flex items-center justify-center mb-3 flex-shrink-0">
                       <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a0a0a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${data.icon}</svg>
                   </div>
                   <h2 class="text-xl md:text-3xl font-semibold mb-2 md:mb-4 leading-tight">${data.title}</h2>
                   <p class="text-zinc-400 text-xs md:text-base mb-3 md:mb-6 leading-relaxed">${data.description}</p>
                   <div class="p-3 md:p-4 bg-white/5 rounded-xl md:rounded-2xl border border-white/10">
                       <p class="text-xs md:text-sm text-zinc-400 italic">
                           ${data.quote}${data.quoteAuthor ? `<br><span class="text-[10px] md:text-xs text-zinc-500 mt-1 inline-block">- ${data.quoteAuthor}</span>` : ''}
                       </p>
                   </div>
               </div>
               <div class="w-full md:w-2/3 flex flex-col md:block iframe-outer-mobile flex-1 min-h-0 mt-2 md:mt-0 md:flex-none md:flex-shrink-0 md:h-full">
                   <div class="ppt-frame w-full ${data.aspect} flex-1 min-h-0 md:!h-full md:flex-none">
                       <iframe src="${data.iframe}" class="w-full h-full" frameborder="0" title="PowerPoint Viewer"></iframe>
                   </div>
                   ${SWIPE_HINT}
               </div>
           </div>`;

    const card = document.createElement('div');
    card.className = 'glass-card project-card rounded-[32px] p-4 md:p-8 flex flex-col justify-center items-center group overflow-hidden';
    card.onclick = () => expandCard(card);
    card.innerHTML = CLOSE_BTN + placeholder + expanded;
    return card;
}

function renderCards(containerId, dataArray) {
    const el = document.getElementById(containerId);
    dataArray.forEach(d => el.appendChild(buildCard(d)));
}

// ─────────────────────────────────────────────────────────────────────────────
//  ANIMATION
// ─────────────────────────────────────────────────────────────────────────────

const overlay = document.getElementById('overlay');
let isAnimating = false;
let savedScrollY = 0;

function expandCard(card) {
    if (isAnimating || card.classList.contains('active')) return;
    isAnimating = true;

    const isMobile = window.innerWidth <= 768;
    savedScrollY = window.scrollY;

    const ui = card.querySelector('.placeholder-ui');
    if (ui) ui.style.width = ui.getBoundingClientRect().width + 'px';

    const rect = card.getBoundingClientRect();

    const ghost = document.createElement('div');
    ghost.style.cssText = `width:${rect.width}px;height:${rect.height}px;flex-shrink:0;`;
    card.parentNode.insertBefore(ghost, card);
    card._ghost = ghost;

    card.style.cssText = `transition:none;position:fixed;margin:0;z-index:50;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;height:${rect.height}px;transform:${isMobile ? 'none' : 'translate(0,0)'};border-radius:32px;`;
    card.getBoundingClientRect();
    card.style.transition = '';

    requestAnimationFrame(() => {
        card.classList.add('active');
        if (isMobile) {
            Object.assign(card.style, { top:'0px', left:'0px', width:'100vw', height:'100dvh', borderRadius:'0px', transform:'none' });
            Object.assign(document.body.style, { position:'fixed', top:`-${savedScrollY}px`, left:'0', right:'0', overflow:'hidden' });
        } else {
            Object.assign(card.style, { top:'50%', left:'50%', width:'90vw', height:'85vh', transform:'translate(-50%,-50%)' });
            document.body.style.overflow = 'hidden';
        }
        overlay.classList.add('active');
    });

    setTimeout(() => { isAnimating = false; }, 600);
}

function closeAllCards() {
    if (isAnimating) return;
    const active = document.querySelectorAll('.project-card.active');
    if (!active.length) return;

    isAnimating = true;
    const isMobile = window.innerWidth <= 768;

    if (isMobile) {
        Object.assign(document.body.style, { position:'', top:'', left:'', right:'', overflow:'' });
        window.scrollTo(0, savedScrollY);
    } else {
        document.body.style.overflow = 'auto';
    }

    overlay.classList.remove('active');

    active.forEach(card => {
        card.classList.remove('active');
        const ghost = card._ghost;
        if (!ghost) return;

        card.style.transition = 'none';
        const cur = card.getBoundingClientRect();
        const sy = window.scrollY, sx = window.scrollX;

        Object.assign(card.style, { position:'absolute', transform:'none', top:`${cur.top+sy}px`, left:`${cur.left+sx}px`, width:`${cur.width}px`, height:`${cur.height}px` });
        card.getBoundingClientRect();
        card.style.transition = '';

        const target = ghost.getBoundingClientRect();
        Object.assign(card.style, { top:`${target.top+sy}px`, left:`${target.left+sx}px`, width:`${target.width}px`, height:`${target.height}px` });
        if (isMobile) card.style.borderRadius = '32px';

        setTimeout(() => {
            if (card.classList.contains('active')) return;
            ['position','top','left','width','height','margin','transform','zIndex','borderRadius'].forEach(p => card.style[p] = '');
            const ui = card.querySelector('.placeholder-ui');
            if (ui) ui.style.width = '';
            ghost.parentNode?.removeChild(ghost);
            card._ghost = null;
        }, 600);
    });

    setTimeout(() => { isAnimating = false; }, 600);
}

// ─────────────────────────────────────────────────────────────────────────────
//  EFFECTS
// ─────────────────────────────────────────────────────────────────────────────

function initCircularText() {
    const text = 'MADE BY IVASCU ♥ MADE BY IVASCU ♥ ';
    const container = document.getElementById('circular-text');
    if (!container) return;
    const degree = 360 / text.length;
    text.split('').forEach((char, i) => {
        const span = document.createElement('span');
        span.innerHTML = char === ' ' ? '&nbsp;' : char;
        span.className = 'absolute top-0 left-0 w-full h-full flex justify-center origin-center';
        span.style.transform = `rotate(${i * degree}deg)`;
        container.appendChild(span);
    });
}

function initCursorGlow() {
    if (!window.matchMedia('(pointer: fine)').matches) return;
    document.body.addEventListener('pointermove', ({ x, y }) => {
        document.documentElement.style.setProperty('--x', x);
        document.documentElement.style.setProperty('--y', y);
    });
}

// ─────────────────────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────────────────────

renderCards('scientistsGrid', SCIENTISTS);
renderCards('physicsGrid', PHYSICS);
initCircularText();
initCursorGlow();

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAllCards(); });
</script>
</body>
</html>

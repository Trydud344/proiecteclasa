<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>160 Ani de Știință | Clasa 11 D - CNU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="p-4 md:p-12 pb-0 md:pb-0">

    <div class="top-fade"></div>
    <div id="overlay" class="overlay" onclick="window._closeAllCards()"></div>

    <!-- ── Header ─────────────────────────────────────────────────────── -->
    <header class="max-w-6xl mx-auto text-center mb-16 md:mb-20 mt-6 md:mt-10">
        <div class="inline-block px-4 py-1.5 mb-6 rounded-full border border-zinc-800
                    bg-zinc-900/50 text-[10px] font-bold tracking-[0.2em] uppercase text-zinc-400">
            Colegiul Național „Unirea" • Clasa 11 D
        </div>
        <h1 class="text-4xl md:text-7xl font-light tracking-tighter mb-4">
            160 Ani de <span class="font-semibold">Știință</span>
        </h1>
        <p class="text-zinc-500 text-base md:text-lg font-light italic">
            Arhiva digitală de proiecte și cercetări științifice
        </p>
    </header>

    <!-- ── Scientists section ─────────────────────────────────────────── -->
    <main class="max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8" id="scientistsGrid"></div>
    </main>

    <!-- ── Physics section ────────────────────────────────────────────── -->
    <section class="max-w-6xl mx-auto text-center mt-32 mb-10 md:mb-16">
        <h2 class="text-3xl md:text-6xl font-light tracking-tighter mb-4">
            <span class="font-semibold">Fizica</span> din spatele obiectelor obișnuite
        </h2>
        <p class="text-zinc-500 text-base md:text-lg font-light italic mb-12">
            Aplicații practice ale undelor electromagnetice
        </p>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8" id="physicsGrid"></div>
    </section>

    <!-- ── Footer ─────────────────────────────────────────────────────── -->
    <footer class="w-full border-t border-zinc-900 mt-24 md:mt-32">
        <div class="relative max-w-6xl mx-auto py-8 md:py-10 px-4 flex items-center justify-center">
            <p class="text-center text-zinc-600 text-xs tracking-widest uppercase font-medium z-10">
                2026 • Colegiul Național UNIREA • Clasa 11 D
            </p>
            <div class="absolute right-2 md:right-8 top-1/2 -translate-y-1/2 mt-2 md:mt-3
                        w-20 h-20 md:w-24 md:h-24 text-zinc-500 hover:text-white
                        transition-colors duration-300 pointer-events-none md:pointer-events-auto cursor-default">
                <div id="circular-text"
                     class="relative w-full h-full animate-[spin_12s_linear_infinite] text-[8px] md:text-[9.5px] font-bold">
                </div>
            </div>
        </div>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>
</html>
